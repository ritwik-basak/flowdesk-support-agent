name: Deploy Backend

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy To Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Clear gcloud Run endpoint override
        run: |
          gcloud config unset api_endpoint_overrides/run || true
          unset CLOUDSDK_API_ENDPOINT_OVERRIDES_RUN || true
          echo "CLOUDSDK_API_ENDPOINT_OVERRIDES_RUN=" >> "$GITHUB_ENV"

      - name: Deploy backend from source
        env:
          CLOUDSDK_API_ENDPOINT_OVERRIDES_RUN: ""
        run: |
          gcloud run deploy "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --source . \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars PINECONE_API_KEY="${{ secrets.PINECONE_API_KEY }},PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }},LANGCHAIN_TRACING_V2=${{ secrets.LANGCHAIN_TRACING_V2 }},LANGCHAIN_PROJECT=${{ secrets.LANGCHAIN_PROJECT }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},DATABASE_URL=${{ secrets.DATABASE_URL }},GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}"
